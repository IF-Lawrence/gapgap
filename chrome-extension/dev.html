<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GapGap UI 调试</title>
  <link rel="stylesheet" href="content.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f7f8;
      color: #172026;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Noto Sans SC", sans-serif;
    }

    .page {
      max-width: 980px;
      padding: 42px 340px 80px 42px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 30px;
      line-height: 1.25;
    }

    .article {
      display: grid;
      gap: 18px;
      color: #2f3d45;
      font-size: 17px;
      line-height: 1.8;
    }

    .article p {
      margin: 0;
    }

    .dev-controls {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 2147483646;
      width: 286px;
      max-height: calc(100vh - 36px);
      overflow: auto;
      border: 1px solid #d5e0e4;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 14px 42px rgba(20, 30, 40, 0.16);
      padding: 14px;
    }

    .dev-controls h2 {
      margin: 0 0 12px;
      font-size: 15px;
      line-height: 22px;
    }

    .dev-control {
      display: grid;
      gap: 5px;
      margin-bottom: 12px;
      color: #51616a;
      font-size: 12px;
      font-weight: 650;
    }

    .dev-control-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    input[type="range"] {
      width: 100%;
    }

    .dev-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .dev-buttons button {
      height: 32px;
      border: 0;
      border-radius: 7px;
      background: #176b87;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
    }

    .dev-buttons button.secondary {
      background: #e4ecef;
      color: #27363d;
    }

    .dev-output {
      margin-top: 12px;
      border-radius: 8px;
      background: #f2f6f8;
      padding: 10px;
      color: #33444d;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .gapgap-bubble {
      display: inline-flex;
      top: 248px;
      left: 188px;
    }

    .gapgap-result-panel {
      display: flex;
      right: 340px;
    }

    @media (max-width: 900px) {
      .page {
        padding: 32px 24px 520px;
      }

      .dev-controls {
        right: 10px;
        left: 10px;
        top: auto;
        bottom: 10px;
        width: auto;
        max-height: 300px;
      }
    }
  </style>
</head>
<body>
  <aside class="dev-controls">
    <h2>GapGap UI 调试</h2>
    <label class="dev-control">
      <span class="dev-control-row"><span>面板宽度</span><span data-value="width">560px</span></span>
      <input data-var="--gapgap-panel-width" data-unit="px" data-value-target="width" type="range" min="420" max="760" value="560">
    </label>
    <label class="dev-control">
      <span class="dev-control-row"><span>面板高度</span><span data-value="height">420px</span></span>
      <input data-var="--gapgap-panel-height" data-unit="px" data-value-target="height" type="range" min="300" max="620" value="420">
    </label>
    <label class="dev-control">
      <span class="dev-control-row"><span>右侧距离</span><span data-value="right">16px</span></span>
      <input data-var="--gapgap-panel-right" data-unit="px" data-value-target="right" type="range" min="8" max="220" value="16">
    </label>
    <label class="dev-control">
      <span class="dev-control-row"><span>底部距离</span><span data-value="bottom">16px</span></span>
      <input data-var="--gapgap-panel-bottom" data-unit="px" data-value-target="bottom" type="range" min="8" max="180" value="16">
    </label>
    <div class="dev-buttons">
      <button id="toggleBubble" type="button" class="secondary">切换气泡</button>
      <button id="reset" type="button">重置</button>
    </div>
    <div id="cssOutput" class="dev-output"></div>
  </aside>

  <main class="page">
    <h1>模拟网页内容</h1>
    <article class="article">
      <p>在LeanCloud上，数据存储是围绕AVObject进行的。今天出去买菜花了5000元。</p>
      <p>新MacBook Pro有15%的CPU性能提升。你好,世界! 太棒了！！！</p>
      <p>这个页面用来调试 Chrome 插件注入网页后的 UI。你可以直接移动滑块观察面板、气泡和历史栏的尺寸是否合适。</p>
      <p>满意后，把右侧生成的 CSS 变量值同步到 content.css 里的默认值。</p>
    </article>
  </main>

  <button class="gapgap-bubble" type="button">G</button>

  <section class="gapgap-result-panel">
    <div class="gapgap-result-header">
      <div class="gapgap-brand">
        <span class="gapgap-brand-dot"></span>
        <span>
          <strong>GapGap</strong>
          <small>校对结果</small>
        </span>
      </div>
      <div class="gapgap-header-actions">
        <button class="gapgap-icon-button" id="previewSidePanelButton" type="button" aria-label="打开侧边栏" title="打开侧边栏">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 3h7v7"></path><path d="M21 3 10 14"></path><path d="M11 5H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"></path></svg>
        </button>
        <button class="gapgap-icon-button gapgap-result-close" type="button" aria-label="关闭" title="关闭">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
      </div>
    </div>
    <div class="gapgap-result-card">
      <div class="gapgap-result-body">在<span class="gapgap-added-space">&nbsp;</span>LeanCloud<span class="gapgap-added-space">&nbsp;</span>上，数据存储是围绕<span class="gapgap-added-space">&nbsp;</span>AVObject<span class="gapgap-added-space">&nbsp;</span>进行的。今天出去买菜花了<span class="gapgap-added-space">&nbsp;</span>5000<span class="gapgap-added-space">&nbsp;</span>元。你好，世界！太棒了<span class="gapgap-warning">！！！</span></div>
    </div>
    <div class="gapgap-result-footer">
      <div class="gapgap-result-status">已自动校对</div>
      <button class="gapgap-copy-button" type="button">
        <span>复制结果</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7h10v14H8z"></path><path d="M5 3h10v4H8v10H5z"></path></svg>
      </button>
    </div>
  </section>

  <script>
    const defaults = {
      "--gapgap-panel-width": 560,
      "--gapgap-panel-height": 420,
      "--gapgap-panel-right": 16,
      "--gapgap-panel-bottom": 16
    };

    const root = document.documentElement;
    const cssOutput = document.getElementById("cssOutput");

    function updateOutput() {
      const lines = Object.keys(defaults).map((name) => {
        const value = root.style.getPropertyValue(name) || `${defaults[name]}px`;
        return `  ${name}: ${value};`;
      });
      cssOutput.textContent = `.gapgap-result-panel {\n${lines.join("\n")}\n}`;
    }

    document.querySelectorAll("input[type='range']").forEach((input) => {
      input.addEventListener("input", () => {
        const value = `${input.value}${input.dataset.unit || ""}`;
        root.style.setProperty(input.dataset.var, value);
        document.querySelector(`[data-value="${input.dataset.valueTarget}"]`).textContent = value;
        updateOutput();
      });
    });

    document.getElementById("toggleBubble").addEventListener("click", () => {
      const bubble = document.querySelector(".gapgap-bubble");
      bubble.style.display = bubble.style.display === "none" ? "inline-flex" : "none";
    });

    document.getElementById("previewSidePanelButton").addEventListener("click", () => {
      window.location.href = "sidepanel.html";
    });

    document.getElementById("reset").addEventListener("click", () => {
      document.querySelectorAll("input[type='range']").forEach((input) => {
        input.value = defaults[input.dataset.var];
        input.dispatchEvent(new Event("input"));
      });
    });

    updateOutput();
  </script>
</body>
</html>

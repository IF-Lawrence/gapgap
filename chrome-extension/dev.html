<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GapGap 弹窗预览</title>
  <link rel="stylesheet" href="content.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.95), transparent 32%),
        linear-gradient(180deg, #f4f4f4 0%, #ececec 100%);
      color: #17151a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Noto Sans SC", sans-serif;
    }

    .page {
      width: min(760px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 56px 0 120px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 40px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #17151a;
      font-weight: 800;
    }

    .brand-mark {
      display: block;
      width: 24px;
      height: 24px;
      background: url("logo.svg") center / contain no-repeat;
    }

    .preview-actions {
      display: flex;
      gap: 8px;
    }

    .preview-actions button {
      height: 34px;
      border: 1px solid rgba(26, 22, 28, 0.1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: #17151a;
      cursor: pointer;
      padding: 0 13px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
    }

    .article {
      display: grid;
      gap: 18px;
      color: #2b2730;
      font-size: 18px;
      line-height: 1.82;
    }

    .article h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .article p {
      margin: 0;
    }

    .selected {
      border-radius: 6px;
      background: rgba(239, 210, 242, 0.9);
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      padding: 1px 3px;
    }

    .gapgap-bubble {
      display: inline-flex;
      top: 252px;
      left: calc(50% + 118px);
    }

    .gapgap-result-panel {
      display: flex;
      right: 48px;
      bottom: 48px;
    }

    @media (max-width: 820px) {
      .page {
        width: calc(100vw - 28px);
        padding-top: 28px;
      }

      .brand-row {
        align-items: flex-start;
        flex-direction: column;
        margin-bottom: 28px;
      }

      .gapgap-bubble {
        left: auto;
        right: 42px;
      }

      .gapgap-result-panel {
        right: 10px;
        bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="brand-row">
      <div class="brand">
        <span class="brand-mark"></span>
        <span>GapGap</span>
      </div>
      <div class="preview-actions">
        <button id="toggleBubble" type="button">气泡</button>
        <button id="togglePanel" type="button">弹窗</button>
      </div>
    </header>

    <article class="article">
      <h1>模拟网页正文</h1>
      <p>在 LeanCloud 上，数据存储是围绕 AVObject 进行的。今天出去买菜花了 5000 元。</p>
      <p><span class="selected">新MacBook Pro有15%的CPU性能提升。你好,世界! 太棒了！！！</span></p>
      <p>这个预览页只用于观察划词后的浮窗样式：页面里会出现一个小型 G 气泡，以及右下角的校对结果弹窗。</p>
    </article>
  </main>

  <button class="gapgap-bubble" type="button">
    <img class="gapgap-logo" src="logo.svg" alt="">
  </button>

  <section class="gapgap-result-panel">
    <div class="gapgap-result-header">
      <div class="gapgap-brand">
        <span class="gapgap-brand-dot"><img class="gapgap-logo" src="logo.svg" alt=""></span>
        <strong>GapGap</strong>
      </div>
      <div class="gapgap-header-actions">
        <div class="gapgap-result-status">已自动校对</div>
        <button class="gapgap-icon-button gapgap-result-close" type="button" aria-label="关闭" title="关闭">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18.3 5.71-1.41-1.42L12 9.17 7.11 4.29 5.7 5.71 10.59 10.6 5.7 15.49l1.41 1.41L12 12.01l4.89 4.89 1.41-1.41-4.89-4.89 4.89-4.89Z"></path></svg>
        </button>
      </div>
    </div>
    <div class="gapgap-result-card">
      <div class="gapgap-result-body">新<span class="gapgap-added-space">&nbsp;</span>MacBook Pro<span class="gapgap-added-space">&nbsp;</span>有<span class="gapgap-added-space">&nbsp;</span>15%<span class="gapgap-added-space">&nbsp;</span>的<span class="gapgap-added-space">&nbsp;</span>CPU<span class="gapgap-added-space">&nbsp;</span>性能提升。你好，世界！太棒了<span class="gapgap-warning">！！！</span></div>
    </div>
    <div class="gapgap-result-footer">
      <div class="gapgap-footer-left">
        <label class="gapgap-auto-copy">
          <input type="checkbox">
          <span></span>
          <strong>自动复制</strong>
        </label>
      </div>
      <div class="gapgap-footer-actions">
        <button class="gapgap-action-button gapgap-edit-button" type="button" aria-label="编辑" title="编辑">
          <span>编辑</span>
        </button>
        <button class="gapgap-action-button gapgap-copy-button" type="button">
          <span>复制</span>
        </button>
      </div>
    </div>
  </section>

  <script>
    const bubble = document.querySelector(".gapgap-bubble");
    const panel = document.querySelector(".gapgap-result-panel");

    document.getElementById("toggleBubble").addEventListener("click", () => {
      bubble.style.display = bubble.style.display === "none" ? "inline-flex" : "none";
    });

    document.getElementById("togglePanel").addEventListener("click", () => {
      panel.style.display = panel.style.display === "none" ? "flex" : "none";
    });

    document.querySelector(".gapgap-result-close").addEventListener("click", () => {
      panel.style.display = "none";
    });

    document.querySelector(".gapgap-copy-button").addEventListener("click", (event) => {
      const button = event.currentTarget;
      const label = button.querySelector("span");
      label.textContent = "已复制";
      button.classList.add("success");
      setTimeout(() => {
        panel.style.display = "none";
        label.textContent = "复制";
        button.classList.remove("success");
      }, 650);
    });
  </script>
</body>
</html>

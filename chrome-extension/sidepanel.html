<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GapGap 侧边栏</title>
  <link rel="icon" type="image/png" href="icons/icon-32.png">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <main class="sidepanel-shell">
    <section class="workspace" aria-label="校对工作台">
      <section class="composer card-pane" aria-label="校对输入">
        <div class="pane-bar">
          <span class="pill">原文</span>
          <span id="inputCount">0 字符 / 0 字</span>
        </div>
        <textarea id="inputText" spellcheck="false" placeholder="输入文本，结果会自动更新"></textarea>
      </section>

      <section class="result-panel card-pane" aria-label="校对结果">
        <div class="pane-bar">
          <span id="resultStatus">暂无结果</span>
          <span id="resultCount">0 字符 / 0 字</span>
        </div>
        <div id="result" class="result" contenteditable="true" aria-live="polite"></div>
      </section>
    </section>

    <footer class="command-bar">
      <div class="switch-group">
        <span class="slogan">No more ghost gaps</span>
        <label class="switch">
          <input id="bubbleEnabled" type="checkbox">
          <span></span>
          <strong>划词气泡</strong>
        </label>
        <label class="switch">
          <input id="autoCopy" type="checkbox">
          <span></span>
          <strong>自动复制</strong>
        </label>
      </div>
      <div class="command-actions">
        <button id="historyButton" class="icon-button" type="button" aria-label="历史记录" title="历史记录">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M13 3a9 9 0 1 1-6.36 15.36l1.42-1.42A6.96 6.96 0 0 0 13 19a7 7 0 1 0-7-7h3l-4 4-4-4h3a9 9 0 0 1 9-9Zm-1 5h2v4.26l3.08 1.83-1.03 1.72L12 13.4V8Z"></path>
          </svg>
        </button>
        <button id="copyButton" class="copy-button" type="button" aria-label="复制校对结果">
          <span>复制</span>
        </button>
      </div>
    </footer>

    <section id="historyOverlay" class="history-overlay" aria-label="历史记录">
      <div class="history-card">
        <div class="pane-bar">
          <span class="pill">历史记录</span>
          <span id="historyCount">0 条</span>
        </div>
        <label class="history-search" aria-label="搜索历史记录">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9.5 3a6.5 6.5 0 0 1 5.18 10.43l4.45 4.44-1.26 1.26-4.44-4.45A6.5 6.5 0 1 1 9.5 3Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"></path>
          </svg>
          <input id="historySearch" type="search" placeholder="搜索历史记录">
        </label>
        <div id="historyList" class="history-list"></div>
      </div>
      <footer class="command-bar history-command-bar">
        <button id="clearHistory" class="icon-button" type="button" aria-label="清空全部历史" title="清空全部历史">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12Zm2-10h8v10H8V9Zm7.5-5-1-1h-5l-1 1H5v2h14V4h-3.5Z"></path>
          </svg>
        </button>
        <button id="closeHistoryButton" class="copy-button" type="button" aria-label="关闭历史">
          <span>关闭</span>
        </button>
      </footer>
    </section>
  </main>

  <script src="core.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
